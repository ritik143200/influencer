services:
  # Backend Web Service
  - type: web
    name: artisthub-api
    env: node
    region: singapore # Free tier regions typically include oregon, frankfurt, singapore, ohio
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5001"
      - key: MONGO_URI
        sync: false # Requires you to set it manually in the Render dashboard for security
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # Frontend Static Site
  - type: web
    name: artisthub-frontend
    env: static
    rootDir: react-vite-tailwind
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    # Ensures client-side routing works for React SPA (e.g. going directly to /artist)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set this to your backend URL generated by Render manually

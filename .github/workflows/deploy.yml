name: Deploy ViralMantrix to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/viralmantrix_deploy_key
          chmod 600 ~/.ssh/viralmantrix_deploy_key
          ssh-keyscan -H "${{ secrets.AWS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on AWS server
        run: |
          set -e
          ssh -i ~/.ssh/viralmantrix_deploy_key "${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}" <<'EOF'
            set -e
            cd "${{ secrets.PROJECT_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            cd react-vite-tailwind
            npm install
            npm run build

            cd ../backend
            npm install --omit=dev
            pm2 restart "${{ secrets.PM2_APP_NAME }}" --update-env
            pm2 save
          EOF

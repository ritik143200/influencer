<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-label="Glossy creator mascot">
  <defs>
    <radialGradient id="aura" cx="50%" cy="52%" r="58%">
      <stop offset="0" stop-color="#DF7AFE" stop-opacity=".38"/>
      <stop offset=".44" stop-color="#0099FF" stop-opacity=".16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="44%" cy="25%" r="78%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset=".24" stop-color="#EDEBFF"/>
      <stop offset=".58" stop-color="#B58CFF"/>
      <stop offset="1" stop-color="#FF8CCB"/>
    </radialGradient>
    <linearGradient id="glassBlue" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#45BFFF"/>
      <stop offset=".52" stop-color="#B95CFF"/>
      <stop offset="1" stop-color="#FF8CCB"/>
    </linearGradient>
    <linearGradient id="baseGlow" x1="210" x2="690" y1="500" y2="500">
      <stop stop-color="#0099FF" stop-opacity=".15"/>
      <stop offset=".5" stop-color="#DF7AFE" stop-opacity=".88"/>
      <stop offset="1" stop-color="#0099FF" stop-opacity=".15"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="180%">
      <feDropShadow dx="0" dy="38" stdDeviation="32" flood-color="#000000" flood-opacity=".58"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#DF7AFE" flood-opacity=".34"/>
    </filter>
    <filter id="softBlur" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <circle cx="450" cy="330" r="286" fill="url(#aura)"/>
  <ellipse cx="450" cy="522" rx="250" ry="36" fill="#DF7AFE" opacity=".18" filter="url(#softBlur)"/>
  <ellipse cx="450" cy="510" rx="205" ry="24" fill="none" stroke="url(#baseGlow)" stroke-width="14" opacity=".9"/>
  <ellipse cx="450" cy="510" rx="142" ry="13" fill="#000000" opacity=".48"/>

  <g filter="url(#shadow)">
    <path d="M245 374c0-53 42-96 94-96 51 0 94 43 94 96s-43 96-94 96c-52 0-94-43-94-96Z" fill="url(#glassBlue)" opacity=".78"/>
    <path d="M467 374c0-53 42-96 94-96 52 0 94 43 94 96s-42 96-94 96c-52 0-94-43-94-96Z" fill="url(#glassBlue)" opacity=".78"/>

    <circle cx="450" cy="278" r="198" fill="url(#body)"/>
    <path d="M271 286c0-111 80-196 179-196s179 85 179 196" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity=".46"/>
    <path d="M308 426c30 30 79 48 142 48s112-18 142-48" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity=".42"/>

    <ellipse cx="560" cy="202" rx="34" ry="13" fill="#FFFFFF" opacity=".78" transform="rotate(-25 560 202)"/>

    <circle cx="374" cy="258" r="31" fill="#05050A"/>
    <circle cx="526" cy="258" r="31" fill="#05050A"/>
    <circle cx="362" cy="246" r="5" fill="#FFFFFF"/>
    <circle cx="514" cy="246" r="5" fill="#FFFFFF"/>

    <ellipse cx="326" cy="320" rx="31" ry="14" fill="#FF8ACB" opacity=".92"/>
    <ellipse cx="574" cy="320" rx="31" ry="14" fill="#FF8ACB" opacity=".92"/>
    <path d="M398 316c27 37 77 37 104 0" fill="none" stroke="#05050A" stroke-width="15" stroke-linecap="round"/>
